# Alembic configuration for Stoop API.
#
# The database URL is NOT set here — it is injected dynamically in
# migrations/env.py from ``app.config.settings.database_url`` so there is
# no risk of a hardcoded credential leaking into version control.
#
# Run migrations:
#   uv run alembic upgrade head
#   uv run alembic downgrade -1
#   uv run alembic revision --autogenerate -m "description"  (once ORM models exist)

[alembic]
# Path to migration scripts (relative to where alembic is invoked, i.e. apps/api/).
script_location = migrations

# Template for new revision files.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision file timestamps.
timezone = UTC

# sqlalchemy.url is intentionally absent — set in env.py from settings.
# Leaving this blank avoids Alembic emitting confusing "No database URL" warnings.

# Logging configuration — only Alembic/SQLAlchemy loggers; app logs go through structlog.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
